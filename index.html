<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsychoMetric 心理测评分析面板</title>
  <!-- 引入自定义样式 -->
  <link rel="stylesheet" href="css/dashboard.css">
  <!-- 引入第三方图表库：Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="app-container">
    <!-- 左侧导航侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>PsychoMetric</h2>
        <span class="badge">v1.0</span>
      </div>
      <ul class="nav-menu">
        <li class="nav-item active" data-target="survey-view">📝 开始心理测评</li>
        <li class="nav-item" data-target="dashboard-view">📊 数据分析面板</li>
      </ul>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main-content">
      <!-- 视图 1：多维问卷引擎 -->
      <section id="survey-view" class="view-section action-view">
        <div class="card">
          <div class="card-header">
            <span class="progress-text">测评进度</span>
            <div class="progress-bar">
              <div id="progress-fill"></div>
            </div>
          </div>
          <h3 id="question-title">正在加载测评题目...</h3>
          <div id="options-container" class="options-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- 先引入底层数据，再引入业务逻辑 -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
